# Render Blueprint — deploys the Django backend only.
# Database is an EXTERNAL free Postgres (Neon) — see DEPLOY.md.
# Render's own free Postgres expires 30 days after creation, so we don't use it.
# Import this repo at https://dashboard.render.com → New → Blueprint,
# then paste the Neon connection string into DATABASE_URL.
services:
  - type: web
    name: holytree-api
    runtime: python
    rootDir: backend
    plan: free
    # DB(Neon)가 싱가포르(ap-southeast-1)에 있으므로 백엔드도 같은 지역에 둔다.
    # 지역이 다르면 쿼리마다 미국↔싱가포르 왕복(~0.4초) 지연이 붙는다.
    # 주의: Render는 기존 서비스의 지역을 못 바꾼다 — 이 값을 바꾸려면 서비스를 새로 만들어야 한다.
    region: singapore
    buildCommand: "./build.sh"
    # 동시 처리량 확보: 워커 2 × 스레드 4 = 최대 8개 동시 요청 (폴링 부하 대응)
    startCommand: "gunicorn config.wsgi --workers 2 --threads 4 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # After deploying the frontend, set these to its URL:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # External Neon Postgres connection string (incl. ?sslmode=require).
      - key: DATABASE_URL
        sync: false
