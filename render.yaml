# Render Blueprint — deploys the Django backend + a free PostgreSQL database.
# Import this repo at https://dashboard.render.com → New → Blueprint.
services:
  - type: web
    name: holy-spirit-tree-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # After deploying the frontend, set these to its URL:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: holy-spirit-tree-db
          property: connectionString

databases:
  - name: holy-spirit-tree-db
    plan: free
