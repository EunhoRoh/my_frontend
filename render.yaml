# Render Blueprint — deploys the Django backend only.
# Database is an EXTERNAL free Postgres (Neon) — see DEPLOY.md.
# Render's own free Postgres expires 30 days after creation, so we don't use it.
# Import this repo at https://dashboard.render.com → New → Blueprint,
# then paste the Neon connection string into DATABASE_URL.
services:
  - type: web
    name: holytree-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      # After deploying the frontend, set these to its URL:
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      # External Neon Postgres connection string (incl. ?sslmode=require).
      - key: DATABASE_URL
        sync: false
